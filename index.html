<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Smart Attendance Helper</h1>

    <div class="input-box">
        <label>Total Classes Conducted</label>
        <input type="number" id="totalClasses" placeholder="Enter total classes">

        <label>Classes Attended</label>
        <input type="number" id="attendedClasses" placeholder="Enter attended classes">

        <button id="checkBtn">Check Attendance</button>
    </div>

    <div class="result">
        <h2>Your Attendance: <span id="percentage">0%</span></h2>
        <p id="message"></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
